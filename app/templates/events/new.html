{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Create New Event</h1>
    <a href="/events" class="btn btn-outline-secondary">Back to Events</a>
</div>

<div class="row">
    <div class="col-md-8">
        <!-- method POST sends form data to the new_event route in routes.py -->
        <!-- each input name must match what request.form grabs in routes.py -->
        <form method="POST" action="/events/new">
            <div class="mb-3">
                <label class="form-label">Event Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Date</label>
                <input type="date" name="date" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Venue</label>
                <input type="text" name="venue" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <!-- not required so user can leave blank -->
                <textarea name="description" class="form-control" rows="3"></textarea>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Capacity</label>
                    <input type="number" name="capacity" class="form-control" value="100" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Ticket Price (£)</label>
                    <input type="number" name="ticket_price" class="form-control" step="0.01" value="0.00" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Create Event</button>
        </form>
    </div>
</div>

{% endblock %}
