{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>New Registration</h1>
    <a href="/registrations" class="btn btn-outline-secondary">Back to Registrations</a>
</div>

<div class="row">
    <div class="col-md-8">
        <form method="POST" action="/registrations/new">
            <div class="mb-3">
                <label class="form-label">Attendee Name</label>
                <input type="text" name="attendee_name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="attendee_email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Event</label>
                <!-- dropdown populated with all events from routes.py -->
                <select name="event_id" class="form-select" required>
                    <option value="">Select an event...</option>
                    {% for event in events %}
                    <option value="{{ event.id }}">{{ event.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Ticket Type</label>
                <select name="ticket_type" class="form-select">
                    <option value="standard">Standard</option>
                    <option value="vip">VIP</option>
                    <option value="student">Student</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Register</button>
        </form>
    </div>
</div>

{% endblock %}
