{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Add Speaker</h1>
    <a href="/speakers" class="btn btn-outline-secondary">Back to Speakers</a>
</div>

<div class="row">
    <div class="col-md-8">
        <!-- POST sends form data to the speakers route in routes.py -->
        <form method="POST" action="/speakers/new">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Expertise</label>
                <input type="text" name="expertise" class="form-control" placeholder="e.g. Machine Learning, Web Dev">
            </div>
            <div class="mb-3">
                <label class="form-label">Bio</label>
                <textarea name="bio" class="form-control" rows="4"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Add Speaker</button>
        </form>
    </div>
</div>

{% endblock %}
